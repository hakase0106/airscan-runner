name: AirScan - Cleanup Polluted Rows (one-shot)

# 2026-04-25 09:00Z 周辺で混入したゴミ価格を一掃するための一時 workflow。
# 完了後この yml は削除する。

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete polluted price rows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout airscan
        uses: actions/checkout@v4
        with:
          repository: hakase0106/airscan
          token: ${{ secrets.PRIVATE_REPO_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CONFIRM: "yes"
        run: python scripts/cleanup_polluted.py
