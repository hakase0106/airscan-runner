name: AirScan - Flight Price Tracker

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      send_summary:
        description: "チェック完了サマリーをDiscordに送信する"
        type: boolean
        default: false

jobs:
  track:
    name: Check Flight Prices
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: hakase0106/airscan
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AirScan
        working-directory: src
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SEND_SUMMARY: ${{ inputs.send_summary || 'false' }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ **AirScan** GitHub Actions ジョブが失敗しました。ログを確認してください。"}'
